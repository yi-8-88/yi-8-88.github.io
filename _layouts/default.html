<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ page.title | default: site.title }} — {{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body class="dark">
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <p class="site-sub">{{ site.description }}</p>
      </div>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/social' | relative_url }}">Social</a>
        <a href="{{ '/photography' | relative_url }}">Photography</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ site.time | date: "%Y" }} {{ site.author }} — <a href="mailto:{{ site.email }}">{{ site.email }}</a></p>
    </div>
  </footer>

  <script src="{{ '/assets/js/lightbox.js' | relative_url }}" defer></script>
</body>
</html>
