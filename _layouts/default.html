<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ page.title | default: site.title }} — {{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description }}">
  <!-- Google font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script defer src="{{ '/assets/js/lightbox.js' | relative_url }}"></script>
</head>
<body class="site-dark">
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.author | default: site.title }}</a>
        <p class="site-sub">{{ site.description }}</p>
      </div>
      <nav class="site-nav" aria-label="Main">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/social' | relative_url }}">Social</a>
        <a href="{{ '/photography' | relative_url }}">Photography</a>
        <a class="cta" href="{{ '/photography' | relative_url }}">Gallery</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="small">&copy; {{ site.time | date: "%Y" }} {{ site.author }}</div>
      <div class="small">Built with <a href="https://pages.github.com/" target="_blank" rel="noopener">GitHub Pages</a></div>
    </div>
  </footer>
</body>
</html>
